name: 股票文件追踪系统

on:
  schedule:
    - cron: '0 8 * * 1-5' # 北京时间 16:00 运行
  push:
    paths:
      - 'stocks/**'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  track-process:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 # 必须是 v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5 # 必须是 v5
        with:
          python-version: '3.10'

      - name: 安装依赖模块
        run: pip install requests

      - name: 执行追踪逻辑
        run: python tracker.py

      - name: 自动提交并发布到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/
          # 如果没有变动，git commit 会返回 1 导致报错，这里加个判断
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 自动更新个股追踪数据"
            git push
          else
            echo "没有数据变化，无需提交"
          fi
