name: 股票文件追踪系统

on:
  schedule:
    - cron: '0 8 * * 1-5' # 北京时间 16:00 自动运行
  push:
    paths:
      - 'stocks/**' # 只要 stocks 文件夹有新文件或改动，立即运行一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install requests
      - name: 执行追踪逻辑
        run: python tracker.py
      - name: 自动提交更新
        run: |
          git config --global user.name "Stock-Bot"
          git config --global user.email "bot@github.com"
          git add stocks/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 自动更新个股追踪数据"
          git push
