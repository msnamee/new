name: 股票文件追踪系统

on:
  schedule:
    - cron: '0 8 * * 1-5' # 北京时间 16:00 运行
  push:
    paths:
      - 'stocks/**'
  workflow_dispatch: # 允许你手动点击按钮运行

# 显式声明写入权限（双重保险）
permissions:
  contents: write

jobs:
  track-process:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 # 已升级：消灭 Node 警告

      - name: 配置 Python 环境
        uses: actions/setup-python@v5 # 已升级：消灭 Node 警告
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 执行追踪逻辑
        run: python tracker.py

      - name: 自动提交并推送更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/
          # 检查是否有改动，有改动才 commit，避免空提交报错
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 自动更新个股追踪数据: $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
