name: 股票文件追踪系统

on:
  schedule:
    # 北京时间 15:13 运行 (15:13 - 8 = 07:13 UTC)
    - cron: '13 7 * * 1-5'
  push:
    paths:
      - 'stocks/**'
      - 'tracker.py'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  track-process:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖模块
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 执行追踪逻辑
        run: python tracker.py

      - name: 自动提交并发布更新
        run: |
          # 设定机器人身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 修复 128 错误：使用 github.ref_name 动态获取当前分支名（兼容 main 和 master）
          CURRENT_BRANCH="${{ github.ref_name }}"
          echo "当前操作分支: $CURRENT_BRANCH"
          
          # 确保当前在正确的分支上，并拉取最新代码防止冲突
          git checkout $CURRENT_BRANCH
          git pull origin $CURRENT_BRANCH --rebase
          
          # 添加所需追踪的目录
          git add stocks/
          
          # 检查是否有文件变动
          if [ -n "$(git status --porcelain stocks/)" ]; then
            git commit -m "🤖 自动更新收盘追踪数据"
            git push origin $CURRENT_BRANCH
            echo "✅ 数据已成功更新并推送到仓库。"
          else
            echo "📭 运行完毕，但未检测到 stocks/ 目录下的文件有任何新变动。"
          fi
