name: 股票文件追踪系统

on:
  schedule:
    - cron: '0 8 * * 1-5' # 北京时间 16:00 自动运行
  push:
    paths:
      - 'stocks/**'
  workflow_dispatch: 

# 显式开启写入权限，解决 Exit code 128
permissions:
  contents: write

jobs:
  track-process:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 # 已升级，消除警告

      - name: 配置 Python 环境
        uses: actions/setup-python@v5 # 已升级，消除警告
        with:
          python-version: '3.10'

      - name: 安装依赖模块
        run: pip install requests

      - name: 执行追踪逻辑
        run: python tracker.py

      - name: 自动提交并发布更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/
          # 只有发现 stocks/ 文件夹有变动时才提交，防止空提交报错
          if [ -n "$(git status --porcelain stocks/)" ]; then
            git commit -m "🤖 自动更新个股追踪数据"
            git push
          else
            echo "没有发现数据变动，无需提交。"
          fi
