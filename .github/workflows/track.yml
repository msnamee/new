name: 股票文件追踪系统

on:
  schedule:
    # 北京时间 15:05 运行 (15:05 - 8 = 07:05 UTC)
    - cron: '5 7 * * 1-5'
  push:
    paths:
      - 'stocks/**'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  track-process:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖模块
        run: pip install requests

      - name: 执行追踪逻辑
        run: python tracker.py

      - name: 自动提交并发布更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/
          if [ -n "$(git status --porcelain stocks/)" ]; then
            git commit -m "🤖 自动更新收盘追踪数据"
            git push
          else
            echo "没有发现数据变动，无需提交。"
          fi
